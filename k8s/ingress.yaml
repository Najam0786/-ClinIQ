apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cliniq-ingress
  namespace: cliniq
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: cliniq.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cliniq-api-service
                port:
                  number: 80
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: cliniq-api-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cliniq-streamlit-service
                port:
                  number: 80
